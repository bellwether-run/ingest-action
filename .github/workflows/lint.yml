name: lint

on:
  push:
    branches: [main]
  pull_request:

# This workflow only consumes trusted inputs (checkout + static files).
# No `github.event.issue.*`, `github.event.pull_request.title`, or other
# user-controlled string interpolations appear in any `run:` block — every
# command operates on files committed to the repo.

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck scripts/ingest.sh

  action-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate action.yml is parseable
        run: python3 -c "import yaml; yaml.safe_load(open('action.yml'))"
      - name: Required fields present
        run: python3 scripts/validate_action_yml.py

  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on the ingest script
        run: bash -n scripts/ingest.sh
